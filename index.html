<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      width: 280px;
    }

    .display {
      background: #0f3460;
      border-radius: 8px;
      padding: 16px;
      text-align: right;
      margin-bottom: 16px;
    }

    .display .expression {
      color: #a0a0c0;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 4px;
    }

    .display .result {
      color: #e0e0ff;
      font-size: 32px;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 18px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: filter 0.1s, transform 0.1s;
    }

    button:active {
      filter: brightness(1.3);
      transform: scale(0.96);
    }

    .btn-number {
      background: #1a1a4e;
      color: #e0e0ff;
    }

    .btn-operator {
      background: #e94560;
      color: white;
    }

    .btn-equal {
      background: #0f3460;
      color: #e0e0ff;
    }

    .btn-clear {
      background: #533483;
      color: white;
    }

    .btn-zero {
      grid-column: span 2;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-clear" onclick="toggleSign()">+/-</button>
      <button class="btn-clear" onclick="percentage()">%</button>
      <button class="btn-operator" onclick="setOperator('/')">÷</button>

      <button class="btn-number" onclick="appendNumber('7')">7</button>
      <button class="btn-number" onclick="appendNumber('8')">8</button>
      <button class="btn-number" onclick="appendNumber('9')">9</button>
      <button class="btn-operator" onclick="setOperator('*')">×</button>

      <button class="btn-number" onclick="appendNumber('4')">4</button>
      <button class="btn-number" onclick="appendNumber('5')">5</button>
      <button class="btn-number" onclick="appendNumber('6')">6</button>
      <button class="btn-operator" onclick="setOperator('-')">−</button>

      <button class="btn-number" onclick="appendNumber('1')">1</button>
      <button class="btn-number" onclick="appendNumber('2')">2</button>
      <button class="btn-number" onclick="appendNumber('3')">3</button>
      <button class="btn-operator" onclick="setOperator('+')">+</button>

      <button class="btn-number btn-zero" onclick="appendNumber('0')">0</button>
      <button class="btn-number" onclick="appendDecimal()">.</button>
      <button class="btn-equal" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let previous = null;
    let operator = null;
    let shouldResetDisplay = false;

    function updateDisplay(expression = '') {
      document.getElementById('result').textContent = current;
      document.getElementById('expression').textContent = expression;
    }

    function appendNumber(num) {
      if (shouldResetDisplay) {
        current = num;
        shouldResetDisplay = false;
      } else {
        current = current === '0' ? num : current + num;
      }
      updateDisplay();
    }

    function appendDecimal() {
      if (shouldResetDisplay) {
        current = '0.';
        shouldResetDisplay = false;
      } else if (!current.includes('.')) {
        current += '.';
      }
      updateDisplay();
    }

    function setOperator(op) {
      if (operator && !shouldResetDisplay) {
        calculate(true);
      }
      previous = current;
      operator = op;
      shouldResetDisplay = true;
      const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      updateDisplay(`${previous} ${symbols[op]}`);
    }

    function calculate(chaining = false) {
      if (!operator || previous === null) return;
      const a = parseFloat(previous);
      const b = parseFloat(current);
      let result;
      switch (operator) {
        case '+': result = a + b; break;
        case '-': result = a - b; break;
        case '*': result = a * b; break;
        case '/': result = b !== 0 ? a / b : 'Error'; break;
      }
      const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      if (!chaining) updateDisplay(`${previous} ${symbols[operator]} ${b} =`);
      current = result.toString();
      if (!chaining) { operator = null; previous = null; }
      shouldResetDisplay = true;
      document.getElementById('result').textContent = current;
    }

    function clearAll() {
      current = '0';
      previous = null;
      operator = null;
      shouldResetDisplay = false;
      updateDisplay();
    }

    function toggleSign() {
      current = (parseFloat(current) * -1).toString();
      updateDisplay();
    }

    function percentage() {
      current = (parseFloat(current) / 100).toString();
      updateDisplay();
    }
  </script>
</body>
</html>
